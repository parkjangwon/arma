deny_patterns:
  - "(?i)ignore\\s+all\\s+previous\\s+instructions"
  - "(?i)(disregard|forget|bypass)\\s+(all\\s+)?(previous|prior)\\s+instructions"
  - "(?i)(override|replace|discard)\\s+(the\\s+)?(system|developer)\\s+(prompt|instructions|message)"
  - "(?i)reveal\\s+.*\\s+prompt"
  - "(?i)(show|print|dump|leak|expose)\\s+(the\\s+)?(system|developer|hidden|internal)\\s+(prompt|instructions|message)"
  - "(?i)(do\\s+anything\\s+now|dan\\s+mode|developer\\s+mode)"
  - "(?i)(disable|turn\\s*off|bypass)\\s+(safety|guardrails|policy|moderation)"
  - "(?i)(base64|hex|unicode|url)\\s*(decode|decode\\s+this)"
  - "(?i)(zero\\s*width|homoglyph|obfuscat(e|ion))"
  - "(?i)(api\\s*key|access\\s*token|secret\\s*key|private\\s*key|session\\s*cookie|password)"
  - "(?i)(chain\\s*of\\s*thought|reasoning\\s*trace|hidden\\s*reasoning)"
  - "(?i)(pretend|simulate)\\s+to\\s+be\\s+(system|developer|admin)"
  - "(?i)(ignore|무시).*(지시|지침|instructions)"
  - "(?i)(시스템|개발자).*(프롬프트|메시지).*(공개|출력|유출)"
  - "(?i)(보안|정책|가드레일).*(해제|우회|무력화)"

settings:
  sensitivity_score: 78
